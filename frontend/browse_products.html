<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DressMate - Browse Products</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#994ce6",
            "background-light": "#f7f6f8",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Inter", sans-serif; }
  </style>
</head>
<body class="bg-background-light text-slate-900 min-h-screen">
  <script src="auth.js"></script>
  <script src="layout.js"></script>

  <!-- Navigation Bar -->
  <header class="flex items-center justify-between border-b border-primary/10 bg-white/80 backdrop-blur-md px-6 py-4 lg:px-20 fixed top-0 left-0 right-0 z-50">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-3">
        <div class="bg-primary p-2 rounded-lg text-white"><span class="material-symbols-outlined">apparel</span></div>
        <h2 class="text-slate-900 text-xl font-bold tracking-tight">DressMate</h2>
      </a>
    </div>
    <nav class="hidden md:flex items-center gap-10">
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="index.html">Home</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="image_upload_page.html">Upload</a>
      <a class="text-sm font-medium transition-colors text-primary border-b-2 border-primary" href="browse_products.html">Browse</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="style_match.html">Style Match</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="my_wardrobe.html">My Wardrobe</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="gemini_stylist.html">AI Stylist</a>
    </nav>
    <div class="flex items-center gap-4">
      <button id="sharedMenuButton" class="md:hidden flex items-center justify-center rounded-full size-10 text-slate-500 hover:bg-slate-100 transition-colors">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="relative">
        <button id="sharedUserButton" class="h-10 w-10 rounded-full bg-primary/15 border-2 border-primary/25 flex items-center justify-center text-primary font-bold hover:border-primary/50 transition-all">U</button>
        <div id="sharedUserDropdown" class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-40 hidden border border-slate-100">
          <div class="px-4 py-2 border-b border-slate-100">
            <p class="text-sm font-semibold text-slate-900">User</p>
            <p class="text-xs text-slate-500">Sign in to save your style</p>
          </div>
          <button id="sharedLoginBtn" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Login</button>
        </div>
      </div>
    </div>
  </header>
  <div id="sharedMobileMenu" class="hidden md:hidden bg-white border-b border-primary/10 px-6 py-4 flex flex-col gap-3">
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="index.html">Home</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="image_upload_page.html">Upload</a>
    <a class="text-sm font-medium transition-colors text-primary font-bold" href="browse_products.html">Browse</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="style_match.html">Style Match</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="my_wardrobe.html">My Wardrobe</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="gemini_stylist.html">AI Stylist</a>
  </div>

  <div class="flex min-h-screen flex-col">
    <main class="mx-auto w-full max-w-7xl flex-1 px-6 py-10 lg:px-10 pt-24">
      <section class="mb-8 rounded-[2rem] bg-white p-8 shadow-sm border border-slate-100">
        <p class="text-xs font-bold uppercase tracking-[0.3em] text-primary">Catalog</p>
        <div class="mt-3 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <h1 class="text-4xl font-black tracking-tight">Browse Products</h1>
            <p id="itemCount" class="mt-2 text-slate-500">Loading available styles.</p>
          </div>
          <div class="grid gap-3 sm:grid-cols-2">
            <input id="brandFilter" type="text" placeholder="Brand" class="rounded-xl border-slate-200 bg-white text-sm" />
            <select id="sortFilter" class="rounded-xl border-slate-200 bg-white text-sm">
              <option value="relevance">Recommended</option>
              <option value="rating">Top Rated</option>
              <option value="price_asc">Price Low to High</option>
              <option value="price_desc">Price High to Low</option>
            </select>
          </div>
        </div>
      </section>

      <section id="productsGrid" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4"></section>

      <section class="mt-10 flex items-center justify-center gap-3">
        <button id="prevButton" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Previous</button>
        <p id="pageLabel" class="text-sm text-slate-500">Page 1</p>
        <button id="nextButton" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Next</button>
      </section>
    </main>
  </div>

  <script src="api.js"></script>
  <script>
    initSharedPage({ activeNav: "browse" });

    const state = {
      page: 1,
      pages: 1,
    };

    async function loadProducts() {
      const grid = document.getElementById("productsGrid");
      showSkeleton(grid, 8);

      try {
        const data = await API.listProducts({
          brand: document.getElementById("brandFilter").value.trim() || undefined,
          sort: document.getElementById("sortFilter").value,
          page: state.page,
          perPage: 12,
        });

        state.pages = data.pages || 1;
        document.getElementById("itemCount").textContent = `${data.total || 0} item${data.total === 1 ? "" : "s"} available`;
        document.getElementById("pageLabel").textContent = `Page ${state.page} of ${state.pages}`;
        document.getElementById("prevButton").disabled = state.page <= 1;
        document.getElementById("nextButton").disabled = state.page >= state.pages;

        if (!data.results || !data.results.length) {
          grid.innerHTML = `<div class="col-span-full rounded-3xl bg-white p-12 text-center text-slate-500 border border-slate-100">No products found for these filters.</div>`;
          return;
        }

        grid.innerHTML = data.results.map((product) => renderProductCard(product)).join("");
      } catch (error) {
        showError(grid, "Could not load products. Please make sure the backend is running.");
      }
    }

    function resetToFirstPage() {
      state.page = 1;
      loadProducts();
    }

    document.getElementById("sortFilter").addEventListener("change", resetToFirstPage);
    document.getElementById("brandFilter").addEventListener("input", resetToFirstPage);
    document.getElementById("prevButton").addEventListener("click", () => {
      if (state.page > 1) {
        state.page -= 1;
        loadProducts();
      }
    });
    document.getElementById("nextButton").addEventListener("click", () => {
      if (state.page < state.pages) {
        state.page += 1;
        loadProducts();
      }
    });

    document.addEventListener("DOMContentLoaded", loadProducts);
  </script>
</body>
</html>
