<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DressMate - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-container {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-bottom: 15px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .toggle-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .toggle-text a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .extra-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .extra-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>👗 DressMate</h1>
                <p>Your AI Fashion Stylist</p>
            </div>

            <div class="form-container">
                <!-- Login Form -->
                <div id="login-form">
                    <h2 style="margin-bottom: 20px; color: #333; font-size: 22px;">Welcome Back</h2>

                    <div class="alert error" id="login-error"></div>
                    <div class="alert success" id="login-success"></div>

                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>

                    <div class="loading" id="login-loading">
                        <span class="spinner"></span> Logging in...
                    </div>

                    <button class="btn btn-primary" id="login-btn">Login</button>

                    <div class="toggle-text">
                        Don't have an account? <a onclick="toggleForms()">Register here</a>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="hidden">
                    <h2 style="margin-bottom: 20px; color: #333; font-size: 22px;">Join DressMate</h2>

                    <div class="alert error" id="register-error"></div>
                    <div class="alert success" id="register-success"></div>

                    <div class="form-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input type="password" id="register-confirm" placeholder="••••••••" required>
                    </div>

                    <div class="loading" id="register-loading">
                        <span class="spinner"></span> Creating account...
                    </div>

                    <button class="btn btn-primary" id="register-btn">Create Account</button>

                    <div class="toggle-text">
                        Already have an account? <a onclick="toggleForms()">Login here</a>
                    </div>
                </div>

                <div class="extra-info">
                    <strong>Demo Account:</strong><br>
                    Email: testuser@example.com<br>
                    Password: password123
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Ensure we're not already authenticated
        if (AUTH.isAuthenticated()) {
            window.location.href = "index.html";
        }

        /**
         * Toggle between login and register forms
         */
        function toggleForms() {
            document.getElementById("login-form").classList.toggle("hidden");
            document.getElementById("register-form").classList.toggle("hidden");
            
            // Clear all alerts
            document.querySelectorAll(".alert").forEach(alert => {
                alert.style.display = "none";
                alert.textContent = "";
            });
        }

        /**
         * Show alert message
         */
        function showAlert(elementId, message, type = "error") {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.style.display = "block";
            alert.className = `alert ${type}`;
        }

        /**
         * Login form handler
         */
        document.getElementById("login-btn").addEventListener("click", async (e) => {
            e.preventDefault();

            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const loading = document.getElementById("login-loading");
            const errorDiv = document.getElementById("login-error");

            if (!email || !password) {
                showAlert("login-error", "Please enter both email and password");
                return;
            }

            loading.classList.add("active");
            errorDiv.style.display = "none";

            const result = await AUTH.login(email, password);

            loading.classList.remove("active");

            if (result.success) {
                showAlert("login-success", "Login successful! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                showAlert("login-error", result.error);
            }
        });

        /**
         * Register form handler
         */
        document.getElementById("register-btn").addEventListener("click", async (e) => {
            e.preventDefault();

            const name = document.getElementById("register-name").value;
            const email = document.getElementById("register-email").value;
            const password = document.getElementById("register-password").value;
            const confirm = document.getElementById("register-confirm").value;
            const loading = document.getElementById("register-loading");
            const errorDiv = document.getElementById("register-error");

            if (!name || !email || !password || !confirm) {
                showAlert("register-error", "Please fill in all fields");
                return;
            }

            if (password !== confirm) {
                showAlert("register-error", "Passwords do not match");
                return;
            }

            if (password.length < 6) {
                showAlert("register-error", "Password must be at least 6 characters");
                return;
            }

            loading.classList.add("active");
            errorDiv.style.display = "none";

            const result = await AUTH.register(email, password, name);

            loading.classList.remove("active");

            if (result.success) {
                showAlert("register-success", "Account created! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                showAlert("register-error", result.error);
            }
        });

        // Allow Enter key to submit
        document.getElementById("login-password").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("login-btn").click();
        });

        document.getElementById("register-confirm").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("register-btn").click();
        });
    </script>
</body>
</html>
