<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DressMate - Product Detail</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#994ce6",
            "background-light": "#f7f6f8",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Inter", sans-serif; }
  </style>
</head>
<body class="bg-background-light text-slate-900 min-h-screen">
  <script src="auth.js"></script>
  <script src="layout.js"></script>

  <!-- Navigation Bar -->
  <header class="flex items-center justify-between border-b border-primary/10 bg-white/80 backdrop-blur-md px-6 py-4 lg:px-20 fixed top-0 left-0 right-0 z-50">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-3">
        <div class="bg-primary p-2 rounded-lg text-white"><span class="material-symbols-outlined">apparel</span></div>
        <h2 class="text-slate-900 text-xl font-bold tracking-tight">DressMate</h2>
      </a>
    </div>
    <nav class="hidden md:flex items-center gap-10">
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="index.html">Home</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="image_upload_page.html">Upload</a>
      <a class="text-sm font-medium transition-colors text-primary border-b-2 border-primary" href="browse_products.html">Browse</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="style_match.html">Style Match</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="my_wardrobe.html">My Wardrobe</a>
      <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="gemini_stylist.html">AI Stylist</a>
    </nav>
    <div class="flex items-center gap-4">
      <button id="sharedMenuButton" class="md:hidden flex items-center justify-center rounded-full size-10 text-slate-500 hover:bg-slate-100 transition-colors">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="relative">
        <button id="sharedUserButton" class="h-10 w-10 rounded-full bg-primary/15 border-2 border-primary/25 flex items-center justify-center text-primary font-bold hover:border-primary/50 transition-all">U</button>
        <div id="sharedUserDropdown" class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg py-2 z-40 hidden border border-slate-100">
          <div class="px-4 py-2 border-b border-slate-100">
            <p class="text-sm font-semibold text-slate-900">User</p>
            <p class="text-xs text-slate-500">Sign in to save your style</p>
          </div>
          <button id="sharedLoginBtn" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Login</button>
        </div>
      </div>
    </div>
  </header>
  <div id="sharedMobileMenu" class="hidden md:hidden bg-white border-b border-primary/10 px-6 py-4 flex flex-col gap-3">
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="index.html">Home</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="image_upload_page.html">Upload</a>
    <a class="text-sm font-medium transition-colors text-primary font-bold" href="browse_products.html">Browse</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="style_match.html">Style Match</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="my_wardrobe.html">My Wardrobe</a>
    <a class="text-sm font-medium transition-colors text-slate-600 hover:text-primary" href="gemini_stylist.html">AI Stylist</a>
  </div>

  <div class="flex min-h-screen flex-col">
    <main class="mx-auto w-full max-w-7xl flex-1 px-6 py-10 lg:px-10 pt-24">
      <div id="productShell" class="grid gap-8 lg:grid-cols-[0.9fr_1.1fr]">
        <section class="rounded-[2rem] bg-white p-6 shadow-sm border border-slate-100">
          <img id="mainImage" src="https://placehold.co/700x900?text=Loading" alt="Product image" class="aspect-[4/5] w-full rounded-[1.5rem] object-cover bg-slate-100" />
        </section>

        <section class="rounded-[2rem] bg-white p-8 shadow-sm border border-slate-100">
          <p id="productBrand" class="text-xs font-bold uppercase tracking-[0.3em] text-primary">Loading</p>
          <h1 id="productName" class="mt-3 text-4xl font-black tracking-tight">Loading product</h1>
          <div class="mt-4 flex flex-wrap items-center gap-4">
            <p id="productPrice" class="text-2xl font-bold text-slate-900"></p>
            <span id="productType" class="rounded-full bg-primary/10 px-3 py-1 text-xs font-semibold capitalize text-primary"></span>
            <span id="productColor" class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold capitalize text-slate-600"></span>
          </div>
          <p id="productDescription" class="mt-6 max-w-2xl text-slate-600 leading-7"></p>

          <div class="mt-8 flex flex-wrap gap-3">
            <button id="saveButton" class="rounded-xl bg-primary px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-primary/20 hover:bg-primary/90">Save to Wardrobe</button>
            <a href="browse_products.html" class="rounded-xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50">Back to Browse</a>
          </div>
        </section>
      </div>

      <section class="mt-10">
        <div class="mb-5 flex items-end justify-between">
          <div>
            <h2 class="text-2xl font-black tracking-tight">Similar Products</h2>
            <p class="text-slate-500">Related styles from the same recommendation engine.</p>
          </div>
        </div>
        <div id="similarGrid" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4"></div>
      </section>
    </main>
  </div>

  <script src="api.js"></script>
  <script>
    initSharedPage({ activeNav: "browse" });

    function getCurrentProductId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function getCachedProduct() {
      try {
        const raw = sessionStorage.getItem("dressmate_selected_product");
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function renderProduct(product) {
      if (!product) return;
      document.title = `${product.name || "Product"} - DressMate`;
      document.getElementById("mainImage").src = resolveImageUrl(product.image_url);
      document.getElementById("productBrand").textContent = product.brand || "DressMate";
      document.getElementById("productName").textContent = product.name || "Fashion Item";
      document.getElementById("productPrice").textContent = product.price ? `Rs. ${product.price}` : "Price on request";
      document.getElementById("productType").textContent = product.product_type || "fashion";
      document.getElementById("productColor").textContent = product.colour || "versatile";
      document.getElementById("productDescription").textContent = product.description || "No description available.";
    }

    function saveCurrentProduct() {
      const id = getCurrentProductId();
      if (!id) return;

      const button = document.getElementById("saveButton");
      button.disabled = true;
      button.textContent = "Saving...";

      const token = localStorage.getItem("dressmate_token");
      if (!token) {
        button.textContent = "Save to Wardrobe";
        button.disabled = false;
        alert("Please log in to save to your wardrobe");
        return;
      }

      API.addToWardrobe(id, token)
        .then((response) => {
          button.textContent = "Saved";
          button.disabled = true;
        })
        .catch((error) => {
          console.error("Error saving to wardrobe:", error);
          button.textContent = "Save to Wardrobe";
          button.disabled = false;
          alert("Failed to save to wardrobe. Please try again.");
        });
    }

    async function loadProduct() {
      const productId = getCurrentProductId();
      const similarGrid = document.getElementById("similarGrid");

      if (!productId) {
        document.getElementById("productName").textContent = "Product not found";
        document.getElementById("productDescription").textContent = "No product id was provided in the URL.";
        return;
      }

      const cachedProduct = getCachedProduct();
      if (cachedProduct && String(cachedProduct.id) === String(productId)) {
        renderProduct(cachedProduct);
      }

      showSkeleton(similarGrid, 4);

      try {
        const data = await API.getProduct(productId);
        const product = data.product;
        renderProduct(product);
        sessionStorage.setItem("dressmate_selected_product", JSON.stringify(product));

        if (data.similar && data.similar.length) {
          similarGrid.innerHTML = data.similar.map((item) => renderProductCard(item)).join("");
        } else {
          similarGrid.innerHTML = `<div class="col-span-full rounded-3xl bg-white p-10 text-center text-slate-500 border border-slate-100">No similar products available yet.</div>`;
        }
      } catch (error) {
        document.getElementById("productName").textContent = "Unable to load product";
        document.getElementById("productDescription").textContent = "Please make sure the backend is running and the product exists.";
        similarGrid.innerHTML = "";
      }
    }

    document.getElementById("saveButton").addEventListener("click", saveCurrentProduct);
    document.addEventListener("DOMContentLoaded", loadProduct);
  </script>
</body>
</html>
